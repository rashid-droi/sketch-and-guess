version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: sketch-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: sketchpass
      MYSQL_DATABASE: sketchguess
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:alpine
    container_name: sketch-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  mysql_data:
  redis_data:
